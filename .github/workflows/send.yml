name: "Send Daily Recommendation"

on:
  # Run every morning at 7:00 AM UTC (adjust for your timezone)
  schedule:
    - cron: "0 7 * * *"
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (print only, don't send to Slack)"
        required: false
        default: false
        type: boolean

env:
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
  CHILD_NAME: ${{ secrets.CHILD_NAME }}
  CHILD_BIRTHDATE: ${{ secrets.CHILD_BIRTHDATE }}

jobs:
  send:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Send recommendation to Slack
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="--dry-run"
          fi

          uv run python main.py send $ARGS

      - name: Commit updated CSV (mark as sent)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add recommendations.csv
          git diff --cached --quiet || git commit -m "📨 Marked recommendation as sent [skip ci]"
          git push
